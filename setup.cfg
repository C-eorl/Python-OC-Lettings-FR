[flake8]
max-line-length = 99
exclude = **/migrations/*, .venv

[tool:pytest]
DJANGO_SETTINGS_MODULE = oc_lettings_site.settings
python_files = tests.py test_*.py
addopts = --cov --cov-report=term-missing -v

[coverage:run]
source =
    lettings
    profiles
    oc_lettings_site
omit =
    */migrations/*
    */tests/*
    manage.py
    oc_lettings_site/asgi.py
    oc_lettings_site/wsgi.py